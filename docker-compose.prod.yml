# =====================================================
# 生产环境 Docker Compose
# 启动：docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# 停机：docker compose -f docker-compose.prod.yml down
# 数据迁移：docker compose -f docker-compose.prod.yml exec backend npx prisma migrate deploy
# 备份：docker compose -f docker-compose.prod.yml exec mysql mysqldump ...
# =====================================================
version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: yichun-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yichun_db}
      MYSQL_USER: ${MYSQL_USER:-yichun}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    # 生产不暴露端口到主机（仅内网通信）
    expose:
      - "3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --default-time-zone=+08:00
      --innodb-buffer-pool-size=512M
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - yichun-prod
    # 安全：禁止特权模式
    security_opt:
      - no-new-privileges

  redis:
    image: redis:7-alpine
    container_name: yichun-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data_prod:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    expose:
      - "6379"
    networks:
      - yichun-prod
    security_opt:
      - no-new-privileges

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: yichun-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?charset=utf8mb4&timezone=+08:00
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "3001"
    networks:
      - yichun-prod
    security_opt:
      - no-new-privileges
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: yichun-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - yichun-prod
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # T-P1-06: 管理后台 (独立 Next.js 项目)
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: yichun-admin-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3002"
    networks:
      - yichun-prod
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 384M

  nginx:
    image: nginx:1.25-alpine
    container_name: yichun-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - yichun-prod
    security_opt:
      - no-new-privileges

  # T-P1-07: Let's Encrypt 自动续期 (首次启动需手动 init)
  certbot:
    image: certbot/certbot
    container_name: yichun-certbot
    volumes:
      - ./docker/nginx/certs:/etc/letsencrypt:rw
      - ./docker/nginx/certbot/www:/var/www/certbot:rw
    networks:
      - yichun-prod
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"

volumes:
  mysql_data_prod:
  redis_data_prod:
  nginx_logs:

networks:
  yichun-prod:
    driver: bridge
