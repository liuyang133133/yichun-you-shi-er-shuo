# Redis 生产配置
# 启用密码（通过 env: REDIS_PASSWORD 注入）

# 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存
maxmemory 512mb
maxmemory-policy allkeys-lru

# 安全
# requirepass ${REDIS_PASSWORD}  # 通过 docker-compose 启动参数传入

# 网络
bind 0.0.0.0
protected-mode yes
port 6379

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128

# 日志
loglevel notice
logfile ""
