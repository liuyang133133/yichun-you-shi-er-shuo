name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build
        run: npm run build
      # 后端 lint script 引用了不存在的 eslint + 无 .eslintrc,暂时不跑
      # - name: Lint
      #   run: npm run lint

  frontend:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build
      # `next lint` 在 Next.js 15 需要 .eslintrc 配置,本项目暂未提供,
      # 且现有代码存在 react/no-unescaped-entities 等错误,暂时不跑 lint。
      # 后续提供 .eslintrc.json 并修复 lint 错误后启用:
      # - name: Lint
      #   run: npm run lint

  admin:
    name: Admin type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build
      # 与 frontend 同样的原因,暂时不跑 lint
      # - name: Lint
      #   run: npm run lint
