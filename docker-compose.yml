# T-P1-01: 所有密码/密钥强制从 .env 读,无默认值 (避免 yichun123456 兜底泄露)
# 启动前必须复制 .env.example 为 .env 并填入真实值
#
# 端口说明:
#   - 默认使用 3000/3001/3307 标准端口 (生产环境可直接使用)
#   - Windows 开发机需要用 15300/15301/3308 (避开动态端口范围 1024-15000 + 本机 MySQL 服务)
#     通过 docker-compose.override.yml (gitignore) 实现本地覆盖,不影响仓库主干

services:
  mysql:
    image: mysql:8.0
    container_name: yichun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD_is_required_Generate_with_openssl_rand_hex_16}'
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yichun_db}
      MYSQL_USER: ${MYSQL_USER:-yichun}
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:?MYSQL_PASSWORD_is_required_Generate_with_openssl_rand_hex_16}'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # [P1-AUDIT-2026-07-15] P1-20: dev compose 资源限制 (避免 frontend OOM)
    mem_limit: 512M
    mem_reservation: 256M
    cpus: "1.0"
    networks:
      - yichun-network

  redis:
    image: redis:7-alpine
    container_name: yichun-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # T-P1-01: Redis 加密码认证 (之前是裸 redis-server,无认证风险)
    # 用 environment 注入(强校验) + command 数组 shell 替换
    environment:
      REDIS_PASSWORD: '${REDIS_PASSWORD:?REDIS_PASSWORD_is_required_Generate_with_openssl_rand_hex_16}'
    command:
      - sh
      - -c
      - 'redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru'
    # [P1-AUDIT-2026-07-15] P1-19: redis healthcheck (PONG 验证 + auth 通过)
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>&1 | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    # [P1-AUDIT-2026-07-15] P1-20: dev compose 资源限制
    mem_limit: 256M
    mem_reservation: 128M
    cpus: "0.5"
    networks:
      - yichun-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: yichun-backend
    restart: unless-stopped
    # [P0-AUDIT-2026-07-14] P0-8: 配合 main.ts graceful shutdown, 给 docker stop 留 30s
    # 让 in-flight HTTP 请求跑完 + Prisma 事务 commit + Redis token 黑名单写入.
    # docker compose stop 默认 10s 后 SIGKILL, 配 stop_grace_period: 30s 避免硬杀.
    stop_grace_period: 30s
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      # T-P1-01: DATABASE_URL 引用已强校验的 MYSQL_PASSWORD (注意单引号包裹,避免 YAML interpolation 误识别 ?)
      DATABASE_URL: 'mysql://${MYSQL_USER:-yichun}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-yichun_db}?charset=utf8mb4&timezone=+08:00'
      # T-P1-01: REDIS_URL 引用已强校验的 REDIS_PASSWORD
      REDIS_URL: 'redis://:${REDIS_PASSWORD}@redis:6379'
      # T-P1-01: JWT_SECRET 启动期强校验(≥ 32 字符,否则 main.ts process.exit(1))
      JWT_SECRET: '${JWT_SECRET:?JWT_SECRET_is_required_and_must_be_at_least_32_chars_Generate_with_openssl_rand_hex_32}'
      JWT_EXPIRES_IN: 7d
      # CORS: 显式注入环境变量(避免依赖镜像内 .env),同时兼容标准端口 3000/3002 和 Windows 端口 15300/15302
      # 生产环境应改成真实域名 (例 https://yichun.com,https://admin.yichun.com)
      CORS_ORIGINS: 'http://localhost:3000,http://localhost:3002,http://localhost:15300,http://localhost:15302,http://127.0.0.1:3000,http://127.0.0.1:3002,http://127.0.0.1:15300,http://127.0.0.1:15302'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # [P1-AUDIT-2026-07-15] P1-21: 持久化 uploads 目录 (dev 环境).
      # container 用 process.cwd() + 'uploads' = /app/uploads.
      # 生产环境应迁 S3/OSS,此为开发期临时方案.
      - ./backend/uploads:/app/uploads
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    # [P1-AUDIT-2026-07-15] P1-20: dev compose 资源限制
    mem_limit: 1G
    mem_reservation: 512M
    cpus: "2.0"
    networks:
      - yichun-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: yichun-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # 浏览器端 API URL：用户访问宿主机 localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      # SSR API URL：容器内用 Docker 服务名 `backend` 走内网 DNS
      # 解决致命-01: 容器内 localhost 指向自己导致 SSR fetch 失败
      API_URL: http://backend:3001/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev
    # [P1-AUDIT-2026-07-15] P1-19: frontend healthcheck (Next.js /api/health 路由)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # [P1-AUDIT-2026-07-15] P1-20: dev compose 资源限制 (实测 979M, 上限 768M)
    mem_limit: 768M
    mem_reservation: 384M
    cpus: "1.0"
    networks:
      - yichun-network

  # T-P1-06 修复-02: 管理后台 (独立 Next.js 项目) — 本地 compose 缺此服务导致 v1-acceptance 4 个 admin FAIL
  # 端口: 默认 3002 (Windows 开发机用 15302, 通过 docker-compose.override.yml 覆盖)
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      target: development
    container_name: yichun-admin
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      # 浏览器端 API URL: admin 用户访问宿主机
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      # Admin 是纯 CSR, 不需要 SSR, 不需要 API_URL 服务名
    depends_on:
      - backend
    volumes:
      - ./admin/src:/app/src
      - ./admin/public:/app/public
    command: npm run dev
    # [P1-AUDIT-2026-07-15] P1-19: admin healthcheck (Next.js /login 路由, /api/health 不存在)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3002/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # [P1-AUDIT-2026-07-15] P1-20: dev compose 资源限制
    mem_limit: 512M
    mem_reservation: 256M
    cpus: "1.0"
    networks:
      - yichun-network

volumes:
  mysql_data:
  redis_data:

networks:
  yichun-network:
    driver: bridge