version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: yichun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yichun_db}
      MYSQL_USER: ${MYSQL_USER:-yichun}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-yichun123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - yichun-network

  redis:
    image: redis:7-alpine
    container_name: yichun-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - yichun-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: yichun-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-yichun}:${MYSQL_PASSWORD:-yichun123456}@mysql:3306/${MYSQL_DATABASE:-yichun_db}?charset=utf8mb4&timezone=+08:00
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-yichun-you-shi-er-shuo-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    networks:
      - yichun-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: yichun-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev
    networks:
      - yichun-network

volumes:
  mysql_data:
  redis_data:

networks:
  yichun-network:
    driver: bridge
